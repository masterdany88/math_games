<html lang="pl">

<title>Alphabet Lore Math - Pro Edition</title>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link href="https://fonts.cdnfonts.com/css/alphabet-lore-font" rel="stylesheet">
<style>

        body { font-family: 'Alphabet Lore', sans-serif; background: #0b0e14; color: white; margin: 0; overflow-x: hidden; }

        .gallery-card { background: rgba(30, 41, 59, 0.3); border: 2px solid #1e293b; transition: all 0.3s ease; }

        .unlocked-card { border: 2px solid #fbbf24; background: #1e293b; box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }

        .flying-container { position: fixed; z-index: 1000; pointer-events: none; display: flex; align-items: center; justify-content: center; transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1); width: 300px; height: 300px; }

        .flying-bg-effect { position: absolute; width: 300%; height: 300%; background: radial-gradient(circle, rgba(30, 41, 59, 0.95) 20%, rgba(15, 23, 42, 0.4) 60%, rgba(15, 23, 42, 0) 80%); border-radius: 50%; z-index: 1; transition: opacity 0.6s ease; }

        .flying-img { position: relative; z-index: 2; width: 100px; height: 100px; object-fit: contain; transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1); }

        .modal-overlay { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); }

        input { font-family: 'Alphabet Lore', sans-serif; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
</style>
</head>

                    "A30": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f427/512.gif",

                }

            },

            sport: {

                name: "Sport & Fun",

                items: {

                    "S1": "https://fonts.gstatic.com/s/e/notoemoji/latest/26bd/512.gif",

                    "S2": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f3c0/512.gif",

                    "S5": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f3be/512.gif",

                    "S6": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f3d3/512.gif",

                    "S7": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f3cf/512.gif",

                    "S8": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f3af/512.gif",

                    "S9": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f3b3/512.gif",

                    "S10": "https://fonts.gstatic.com/s/e/notoemoji/latest/26f3/512.gif",

                    "S13": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f94b/512.gif",

                    "S15": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f6f9/512.gif",

                    "S19": "https://fonts.gstatic.com/s/e/notoemoji/latest/26f8_fe0f/512.gif",

                }

            },

            food: {

                name: "Yummy Food",

                items: {

                    "F1": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f355/512.gif",

                    "F5": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f32e/512.gif",

                    "F11": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f9c0/512.gif",

                    "F12": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f34e/512.gif",

                    "F14": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f349/512.gif",

                    "F15": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f353/512.gif",

                    "F16": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f95d/512.gif",

                    "F17": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f347/512.gif",

                    "F18": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f344/512.gif",

                    "F19": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f33d/512.gif",

                    "F20": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f366/512.gif",

                    "F21": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f369/512.gif",

                    "F23": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f36a/512.gif",

                    "F26": "https://fonts.gstatic.com/s/e/notoemoji/latest/2615/512.gif",

                    "F27": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f9cb/512.gif",

                    "F28": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f377/512.gif",

                }

            },

        };

        function App() {

            const [currentSetKey, setCurrentSetKey] = useState("alphabet");

            const [score, setScore] = useState(0);

            const currentImages = SETS[currentSetKey].items;

            const allKeys = Object.keys(currentImages);

            const [unlocked, setUnlocked] = useState([]);

            const [problem, setProblem] = useState({ q: "", a: 0 });

            const [input, setInput] = useState("");

            const [isWrong, setIsWrong] = useState(false);

            const [flyingInfo, setFlyingInfo] = useState(null);

            const [showWinModal, setShowWinModal] = useState(false);

            const cardRefs = useRef({});

            useEffect(() => {

                generateProblem();

            }, [currentSetKey]);

            // Automatyczny submit po wprowadzeniu poprawnej odpowiedzi

            useEffect(() => {

                if (parseInt(input) === problem.a) {

                    handleSubmit();

                }

            }, [input]);

const generateProblem = () => {

                const types = ['mul', 'div'];

                const type = types[Math.floor(Math.random() * types.length)];

                if (type === 'mul') {

                    const a = Math.floor(Math.random() * 9) + 2;

                    const b = Math.floor(Math.random() * 10) + 1;

                    setProblem({ q: `${a} x ${b}`, a: a * b });

                } else {

                    // Dzielenie: (a * b) / a = b

                    const b = Math.floor(Math.random() * 9) + 2; // wynik

                    const a = Math.floor(Math.random() * 10) + 1; // dzielnik

                    const total = a * b; // dzielna

                    setProblem({ q: `${total} : ${a}`, a: b });

                }

            };

            const resetGame = (setKey = currentSetKey) => {

                setCurrentSetKey(setKey);

                setUnlocked([]);

                setScore(0);

                setInput("");

                setShowWinModal(false);

                generateProblem();

            };


const handleSubmit = (e) => {

                if (e) e.preventDefault();

                // Konwersja na liczbę, by uniknąć problemów z porównywaniem stringów

                const userAns = parseInt(input);

                const isCorrect = userAns === problem.a;

                if(isCorrect) {

                    confetti({ particleCount: 30, spread: 40, origin: { x: 0.2, y: 0.2 } });

                    const available = allKeys.filter(k => !unlocked.includes(k));

                    if(available.length > 0) {

                        const picked = available[Math.floor(Math.random() * available.length)];

                        setFlyingInfo({ char: picked, stage: 'start' });

                        setTimeout(() => {

                            const target = cardRefs.current[picked];

                            if (target) {

                                const rect = target.getBoundingClientRect();

                                setFlyingInfo({

                                    char: picked, stage: 'flying',

                                    targetX: rect.left + rect.width / 2,

                                    targetY: rect.top + rect.height / 2

                                });

                            }

                        }, 800);

                        setTimeout(() => {

                            setUnlocked(prev => {

                                const newUnlocked = [...prev, picked];

                                if (newUnlocked.length === allKeys.length) {

                                    setTimeout(() => setShowWinModal(true), 800);

                                }

                                return newUnlocked;

                            });

                            setFlyingInfo(null);

                        }, 2000);

                    }

                    setScore(s => s + 10);

                    setInput("");

                    generateProblem();

                } else {

                    // Jeśli input nie jest pusty i jest błędny (zapobiega czyszczeniu przy pustym submice)

                    if (input !== "") {

                        setIsWrong(true);

                        setInput("");

                        setTimeout(() => setIsWrong(false), 500);

                    }

                }

            };

            return (
<div className="p-4 min-h-screen">
<div className="fixed top-4 left-4 z-40 w-48 sm:w-64">
<div className={`p-4 rounded-2xl bg-slate-900 border-b-4 border-blue-600 shadow-2xl ${isWrong ? 'animate__animated animate__shakeX border-red-500' : ''}`}>
<div className="text-center text-3xl mb-3 font-bold text-yellow-400">{problem.q}</div>
<form onSubmit={handleSubmit}>
<input type="number" value={input} onChange={e => setInput(e.target.value)}

                                    className="w-full bg-slate-800 text-2xl text-center p-2 rounded-xl mb-2 outline-none text-white border-2 border-transparent focus:border-yellow-400"

                                    placeholder="?" autoFocus />
<button className="w-full bg-yellow-500 hover:bg-yellow-400 text-black text-xl py-2 rounded-xl font-black transition-all">OK!</button>
</form>
<div className="mt-2 text-center text-blue-400 text-sm font-bold tracking-widest">WYNIK: {score}</div>
</div>
</div>

                    {flyingInfo && (
<div className="flying-container" style={{

                            top: flyingInfo.stage === 'start' ? '50%' : `${flyingInfo.targetY}px`,

                            left: flyingInfo.stage === 'start' ? '50%' : `${flyingInfo.targetX}px`,

                            transform: 'translate(-50%, -50%)'

                        }}>
<div className="flying-bg-effect" style={{

                                opacity: flyingInfo.stage === 'start' ? 1 : 0,

                                transform: `scale(${flyingInfo.stage === 'start' ? 1.2 : 0.2})`

                            }}></div>
<img src={currentImages[flyingInfo.char]} className="flying-img" style={{

                                transform: flyingInfo.stage === 'start' ? 'scale(5) rotate(0deg)' : 'scale(0.7) rotate(720deg)'

                            }} />
</div>

                    )}

                    <div className="sm:ml-72 mt-24 sm:mt-0">
<h2 className="text-xl mb-4 text-slate-500">Zestaw: {SETS[currentSetKey].name}</h2>
<div className="grid grid-cols-3 sm:grid-cols-6 lg:grid-cols-8 gap-3">

                            {allKeys.map((id) => (
<div key={id} ref={el => cardRefs.current[id] = el}

                                    className={`gallery-card aspect-square rounded-lg flex items-center justify-center ${unlocked.includes(id) ? 'unlocked-card animate__animated animate__bounceIn' : 'opacity-10'}`}>

                                    {unlocked.includes(id) ? <img src={currentImages[id]} className="w-4/5 h-4/5 object-contain" /> : <span className="text-lg font-bold">{id}</span>}
</div>

                            ))}
</div>
</div>

                    {showWinModal && (
<div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4">
<div className="bg-slate-900 border-4 border-yellow-400 rounded-3xl p-8 max-w-lg w-full text-center relative animate__animated animate__zoomIn shadow-2xl">
<button onClick={() => setShowWinModal(false)} className="absolute top-4 right-4 text-slate-500 hover:text-white text-3xl">✕</button>
<h2 className="text-5xl text-yellow-400 mb-2">GRATULACJE!</h2>
<p className="text-slate-400 mb-6">Udało Ci się zebrać wszystkie karty!</p>
<div className="bg-slate-800 p-6 rounded-2xl mb-6">
<p className="text-white mb-4 font-bold uppercase tracking-wider">Wybierz kolejny zestaw:</p>
<div className="grid grid-cols-2 gap-4">

                                        {Object.entries(SETS).map(([key, set]) => (
<button key={key} onClick={() => resetGame(key)}

                                                className={`p-3 rounded-xl border-2 transition-all ${currentSetKey === key ? 'border-yellow-400 bg-yellow-400/10 text-yellow-400' : 'border-slate-600 hover:border-white text-slate-400'}`}>

                                                {set.name}
</button>

                                        ))}
</div>
</div>
<button onClick={() => resetGame()} className="w-full bg-yellow-500 hover:bg-yellow-400 text-black text-2xl py-4 rounded-2xl font-black shadow-lg transition-transform active:scale-95">

                                    ZAGRAJ JESZCZE RAZ
</button>
</div>
</div>

                    )}
</div>

            );

        }

        const root = ReactDOM.createRoot(document.getElementById('root'));

        root.render(<App />);
</script>
</body>
</html>
