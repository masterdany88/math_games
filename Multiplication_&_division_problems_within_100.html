<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alphabet Lore Math - Pro Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.cdnfonts.com/css/alphabet-lore-font" rel="stylesheet">
    <style>
        body { font-family: 'Alphabet Lore', sans-serif; background: #0b0e14; color: white; margin: 0; overflow-x: hidden; }
        .gallery-card { background: rgba(30, 41, 59, 0.3); border: 2px solid #1e293b; transition: all 0.3s ease; min-height: 80px; }
        .unlocked-card { border: 2px solid #fbbf24; background: #1e293b; box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }
        .flying-container { position: fixed; z-index: 1000; pointer-events: none; display: flex; align-items: center; justify-content: center; transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1); width: 100px; height: 100px; }
        .flying-bg-effect { position: absolute; width: 300%; height: 300%; background: radial-gradient(circle, rgba(251, 191, 36, 0.4) 20%, rgba(15, 23, 42, 0) 70%); border-radius: 50%; z-index: 1; }
        .flying-img { position: relative; z-index: 2; width: 100%; height: 100%; object-fit: contain; }
        .modal-overlay { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SETS = {
            alphabet: {
                name: "Alphabet Lore",
                items: {
                    "0": 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/7/7d/0_stabilized.png',
                    "1": 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/5/54/1_Official.png',
                    "2": 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/6/6e/Two-sum.png',
                    "3": 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/3/31/NumberLoreOfficial3.png',
                    "4": 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/1/1d/Official4.png',
                    "5": 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/5/53/Fivuh.png',
                    A: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/4/4c/AL-A.png',
                    B: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/5/50/AL-B.png',
                    C: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/1/1a/AL-C.png',
                    D: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/d/d1/AL-D.png',
                    E: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/a/a1/AL-E.png',
                    F: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/b/bb/FMerch.png',
                    G: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/f/f7/G.png',
                    H: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/c/cf/Hrealistic.png',
                    I: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/5/51/INew.png',
                    J: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/3/31/JNew.png',
                    K: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/d/df/KNew.png',
                    L: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/a/ab/LinMerch.png',
                    M: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/a/a3/M.png',
                    N: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/2/26/NNew.png',
                    O: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/c/c7/ONew.png',
                    P: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/3/3e/PNew.png',
                    Q: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/0/0d/QNew.png',
                    R: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/f/f7/R.png',
                    S: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/7/77/SNew.png',
                    T: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/0/02/T.png',
                    U: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/8/8f/USmile.png',
                    V: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/1/1f/VNew.png',
                    W: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/9/99/WNew.png',
                    X: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/a/a5/X.png',
                    Y: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/8/8a/Y.png',
                    Z: 'https://static.wikia.nocookie.net/unofficial-alphabet-lore/images/5/54/ZNew.png',
                }
            },
            animals: {
                name: "Animated Animals",
                items: {
                    "A1": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f981/512.gif",
                    "A3": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f438/512.gif",
                    "A4": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f412/512.gif",
                    "A6": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f431/512.gif",
                    "A7": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f98a/512.gif",
                    "A9": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f43c/512.gif",
                    "A10": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f9a5/512.gif",
                    "A11": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f9a6/512.gif",
                    "A13": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f998/512.gif",
                    "A15": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f422/512.gif",
                    "A16": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f40d/512.gif",
                    "A17": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f98e/512.gif",
                    "A18": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f419/512.gif",
                    "A19": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f42c/512.gif",
                    "A20": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f988/512.gif",
                    "A21": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f41d/512.gif",
                    "A22": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f41e/512.gif",
                    "A23": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f98b/512.gif",
                    "A24": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f41c/512.gif",
                    "A25": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f423/512.gif",
                    "A28": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f989/512.gif",
                    "A29": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f987/512.gif",
                    "A30": "https://fonts.gstatic.com/s/e/notoemoji/latest/1f427/512.gif",
                }
            }
        };

        function App() {
            const [currentSetKey, setCurrentSetKey] = useState("alphabet");
            const [score, setScore] = useState(0);
            const [unlocked, setUnlocked] = useState([]);
            const [problem, setProblem] = useState({ q: "", a: 0 });
            const [input, setInput] = useState("");
            const [isWrong, setIsWrong] = useState(false);
            const [flyingInfo, setFlyingInfo] = useState(null);
            const [showWinModal, setShowWinModal] = useState(false);

            const cardRefs = useRef({});
            const currentImages = SETS[currentSetKey].items;
            const allKeys = Object.keys(currentImages);

            useEffect(() => {
                generateProblem();
            }, [currentSetKey]);

            useEffect(() => {
                if (input !== "" && parseInt(input) === problem.a) {
                    const timer = setTimeout(() => handleSubmit(), 200);
                    return () => clearTimeout(timer);
                }
            }, [input]);

            const generateProblem = () => {
                const types = ['mul', 'div'];
                const type = types[Math.floor(Math.random() * types.length)];
                if (type === 'mul') {
                    const a = Math.floor(Math.random() * 9) + 2;
                    const b = Math.floor(Math.random() * 10) + 1;
                    setProblem({ q: `${a} × ${b}`, a: a * b });
                } else {
                    const b = Math.floor(Math.random() * 9) + 2;
                    const a = Math.floor(Math.random() * 10) + 1;
                    const total = a * b;
                    setProblem({ q: `${total} ÷ ${a}`, a: b });
                }
            };

            const resetGame = (setKey = currentSetKey) => {
                setCurrentSetKey(setKey);
                setUnlocked([]);
                setScore(0);
                setInput("");
                setShowWinModal(false);
                generateProblem();
            };

            const handleSubmit = (e) => {
                if (e) e.preventDefault();
                const userAns = parseInt(input);

                if (userAns === problem.a) {
                    confetti({ particleCount: 40, spread: 60, origin: { y: 0.3 } });

                    const available = allKeys.filter(k => !unlocked.includes(k));
                    if (available.length > 0) {
                        const picked = available[Math.floor(Math.random() * available.length)];

                        setFlyingInfo({ char: picked, stage: 'start' });

                        setTimeout(() => {
                            const target = cardRefs.current[picked];
                            if (target) {
                                const rect = target.getBoundingClientRect();
                                setFlyingInfo(prev => ({
                                    ...prev,
                                    stage: 'flying',
                                    targetX: rect.left + rect.width / 2,
                                    targetY: rect.top + rect.height / 2
                                }));
                            }
                        }, 600);

                        setTimeout(() => {
                            setUnlocked(prev => {
                                const next = [...prev, picked];
                                if (next.length === allKeys.length) {
                                    setTimeout(() => setShowWinModal(true), 500);
                                }
                                return next;
                            });
                            setFlyingInfo(null);
                        }, 1800);
                    }

                    setScore(s => s + 10);
                    setInput("");
                    generateProblem();
                } else if (input !== "") {
                    setIsWrong(true);
                    setTimeout(() => {
                        setIsWrong(false);
                        setInput("");
                    }, 500);
                }
            };

            return (
                <div className="p-4 min-h-screen">
                    {/* Fixed UI Header */}
                    <div className="fixed top-4 left-1/2 -translate-x-1/2 sm:left-4 sm:translate-x-0 z-40 w-64">
                        <div className={`p-4 rounded-2xl bg-slate-900 border-b-4 border-blue-600 shadow-2xl transition-all ${isWrong ? 'animate__animated animate__shakeX border-red-500' : ''}`}>
                            <div className="text-center text-3xl mb-3 font-bold text-yellow-400">{problem.q}</div>
                            <form onSubmit={handleSubmit}>
                                <input
                                    type="number"
                                    value={input}
                                    onChange={e => setInput(e.target.value)}
                                    className="w-full bg-slate-800 text-2xl text-center p-2 rounded-xl mb-2 outline-none text-white border-2 border-transparent focus:border-yellow-400"
                                    placeholder="?"
                                    autoFocus
                                />
                                <button className="w-full bg-yellow-500 hover:bg-yellow-400 text-black text-xl py-2 rounded-xl font-black transition-all">OK!</button>
                            </form>
                            <div className="mt-2 text-center text-blue-400 text-sm font-bold tracking-widest uppercase">Wynik: {score}</div>
                        </div>
                    </div>

                    {/* Flying Animation */}
                    {flyingInfo && (
                        <div className="flying-container" style={{
                            top: flyingInfo.stage === 'start' ? '50%' : `${flyingInfo.targetY}px`,
                            left: flyingInfo.stage === 'start' ? '50%' : `${flyingInfo.targetX}px`,
                            transform: 'translate(-50%, -50%)'
                        }}>
                            <div className="flying-bg-effect" style={{
                                opacity: flyingInfo.stage === 'start' ? 1 : 0,
                                transition: 'opacity 0.5s'
                            }}></div>
                            <img
                                src={currentImages[flyingInfo.char]}
                                className="flying-img"
                                style={{
                                    transform: flyingInfo.stage === 'start' ? 'scale(4)' : 'scale(0.5) rotate(720deg)',
                                    transition: 'all 1.2s cubic-bezier(0.19, 1, 0.22, 1)'
                                }}
                            />
                        </div>
                    )}

                    {/* Gallery Grid */}
                    <div className="mt-48 sm:mt-0 sm:ml-72">
                        <h2 className="text-xl mb-6 text-slate-500 font-bold uppercase tracking-widest">
                            Zestaw: <span className="text-white">{SETS[currentSetKey].name}</span>
                        </h2>
                        <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-4">
                            {allKeys.map((id) => (
                                <div
                                    key={id}
                                    ref={el => cardRefs.current[id] = el}
                                    className={`gallery-card aspect-square rounded-xl flex items-center justify-center relative overflow-hidden ${unlocked.includes(id) ? 'unlocked-card animate__animated animate__bounceIn' : 'opacity-20'}`}
                                >
                                    {unlocked.includes(id) ? (
                                        <img src={currentImages[id]} className="w-4/5 h-4/5 object-contain" alt={id} />
                                    ) : (
                                        <span className="text-xl font-bold text-slate-600">{id}</span>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Win Modal */}
                    {showWinModal && (
                        <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4">
                            <div className="bg-slate-900 border-4 border-yellow-400 rounded-3xl p-8 max-w-md w-full text-center relative animate__animated animate__zoomIn">
                                <h2 className="text-4xl text-yellow-400 mb-2 font-black">BRAWO!</h2>
                                <p className="text-slate-400 mb-6 font-bold">Wszystkie karty odblokowane!</p>
                                <div className="space-y-3 mb-6">
                                    {Object.entries(SETS).map(([key, set]) => (
                                        <button
                                            key={key}
                                            onClick={() => resetGame(key)}
                                            className={`w-full p-4 rounded-xl border-2 font-bold transition-all ${currentSetKey === key ? 'border-yellow-400 bg-yellow-400 text-black' : 'border-slate-700 text-slate-400 hover:border-white'}`}
                                        >
                                            Graj: {set.name}
                                        </button>
                                    ))}
                                </div>
                                <button
                                    onClick={() => resetGame()}
                                    className="w-full bg-blue-600 hover:bg-blue-500 text-white text-xl py-4 rounded-xl font-black shadow-lg"
                                >
                                    POWTÓRZ ZESTAW
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
